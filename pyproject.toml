[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "rust: marks tests that require the Rust core to be built",
    "gpu: marks tests that require a GPU",
]

[tool.pytest]
addopts = "-v --tb=short --strict-markers"
