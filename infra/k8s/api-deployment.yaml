apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinels-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinels-api
  template:
    metadata:
      labels:
        app: sentinels-api
    spec:
      containers:
        - name: api
          image: sentinels/api:latest
          ports:
            - containerPort: 8000
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 8000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sentinels-api
spec:
  selector:
    app: sentinels-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
