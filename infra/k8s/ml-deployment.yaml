apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinels-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinels-ml
  template:
    metadata:
      labels:
        app: sentinels-ml
    spec:
      containers:
        - name: ml
          image: sentinels/ml:latest
          ports:
            - containerPort: 8001
          resources:
            requests: { cpu: "2000m", memory: "4Gi", nvidia.com/gpu: "1" }
            limits: { cpu: "4000m", memory: "8Gi", nvidia.com/gpu: "1" }
---
apiVersion: v1
kind: Service
metadata:
  name: sentinels-ml
spec:
  selector:
    app: sentinels-ml
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
